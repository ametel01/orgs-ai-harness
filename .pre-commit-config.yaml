repos:
  - repo: local
    hooks:
      - id: ruff-format-check
        name: Ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false

      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false

      - id: pyright
        name: Pyright
        entry: uv run pyright
        language: system
        pass_filenames: false

      - id: detect-secrets
        name: Detect secrets
        entry: uv run detect-secrets-hook --baseline .secrets.baseline
        language: system
